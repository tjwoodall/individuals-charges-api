openapi: 3.0.3
info:
  version: '3.0'
  title: Individuals Charges (MTD)
  description: |
    The following groups of endpoints are stateful in the Sandbox:
    * [Pension Charges](#tag/Pension-Charges)
    * [High Income Child Benefit Charge Submission](#tag/High-Income-Child-Benefit-Charge-Submission)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Pension Charges
    description: Resources relating to an individual's pension charges.
  - name: High Income Child Benefit Charge Submission
    description: Resources relating to an individual's high income child benefit charge submission.
paths:
  /individuals/charges/pensions/{nino}/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve Pension Charges
      description: |
        This endpoint enables you to retrieve previously populated charges for pensions. A National Insurance number and tax year must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.  

        | Header Value (Gov-Test-Scenario) | Scenario                                         |
        |----------------------------------|--------------------------------------------------|
        | N/A - DEFAULT                    | Simulates a successful pension charge response.  |
        | NOT_FOUND                        | Simulates a scenario where no data can be found. |
        | STATEFUL                         | Performs a stateful retrieve.                    |
      tags:
        - Pension Charges
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_6
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
          schema: &ref_7
            type: string
            example: 2021-22
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_8
            type: string
            enum:
              - application/vnd.hmrc.3.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_19
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_9
            type: string
            example: '-'
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: &ref_1
                type: string
                example: Sun, 01 Jan 2023 23:59:59 GMT
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: &ref_2
                type: string
                example: Sun, 02 Jul 2023 23:59:59 GMT
              required: false
            Link:
              name: Link
              in: header
              description: |
                See the API documentation:
              schema: &ref_3
                type: string
                example: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/individuals-charges-api
              required: false
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: Tax years before 2024-25
                    description: Retrieve Pension Charges
                    type: object
                    properties:
                      submittedOn:
                        type: string
                        format: YYYY-MM-DDThh:mm:ss.sssZ
                        description: An ISO-8601 compliant date-time representing when pension charges were submitted.
                        example: '2021-04-04T01:01:01.000Z'
                      pensionSavingsTaxCharges:
                        type: object
                        description: Object holding the booleans for annual allowance.
                        properties:
                          pensionSchemeTaxReference:
                            type: array
                            description: A list of one or more unique references provided by HM Revenue and Customs (HMRC) when the scheme has been registered for tax relief and exemptions. It is 10 characters made up of 8 numbers followed by 2 letters.
                            items:
                              pattern: ^\d{8}[R]{1}[a-zA-Z]{1}$
                              type: string
                              example: 00123456RA
                          lumpSumBenefitTakenInExcessOfLifetimeAllowance:
                            type: object
                            description: Object holding the amount and tax paid on lump sum benefit in excess of the lifetime allowance.
                            properties:
                              amount:
                                description: The amount of the lump sum benefit taken in excess of the lifetime allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                              taxPaid:
                                description: The amount of tax to be paid on the lump sum benefit taken in excess of the lifetime allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                            required:
                              - amount
                              - taxPaid
                          benefitInExcessOfLifetimeAllowance:
                            type: object
                            description: Object holding the amount and tax paid on benefit in excess of the lifetime allowance.
                            properties:
                              amount:
                                description: The amount of the benefit taken in excess of the lifetime allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                              taxPaid:
                                description: The tax to be paid on the benefit taken in excess of the lifetime allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                            required:
                              - amount
                              - taxPaid
                        required:
                          - pensionSchemeTaxReference
                      pensionSchemeOverseasTransfers:
                        type: object
                        description: Object holding the transfer of overseas pension to another pension scheme.
                        properties:
                          overseasSchemeProvider:
                            description: Details of overseas pension provider.
                            type: array
                            items:
                              title: item
                              type: object
                              properties:
                                providerName:
                                  description: The name of the pension provider
                                  type: string
                                  example: Overseas Pensions Plc
                                providerAddress:
                                  description: The address of the pension provider.
                                  type: string
                                  example: 111 Main Street, Any Town, Any City
                                providerCountryCode:
                                  description: A three-letter code that represents a country name. The value must be a ISO 3166-1 alpha-3 code.
                                  type: string
                                  example: CYM
                                qualifyingRecognisedOverseasPensionScheme:
                                  type: array
                                  description: A list of one or more qualifying overseas pension scheme reference numbers for overseas pensions contributions.
                                  items:
                                    pattern: ^[Q]{1}[0-9]{6}$
                                    type: string
                                    example: Q123456
                                pensionSchemeTaxReference:
                                  type: array
                                  description: A list of one or more unique references provided by HM Revenue and Customs (HMRC) when the scheme has been registered for tax relief and exemptions. It is 10 characters made up of 8 numbers followed by 2 letters.
                                  items:
                                    pattern: ^\d{8}[R]{1}[a-zA-Z]{1}$
                                    type: string
                                    example: 00123456RA
                              required:
                                - providerName
                                - providerAddress
                                - providerCountryCode
                          transferCharge:
                            description: The amount the pension provider charges to transfer the pension. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                            type: number
                            example: '1999.99'
                          transferChargeTaxPaid:
                            description: The amount of tax paid on the transfer charge. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                            type: number
                            example: '1999.99'
                        required:
                          - overseasSchemeProvider
                          - transferCharge
                          - transferChargeTaxPaid
                      pensionSchemeUnauthorisedPayments:
                        type: object
                        description: Object holding tax on unauthorised payment.
                        properties:
                          pensionSchemeTaxReference:
                            type: array
                            description: A list of one or more unique references provided by HM Revenue and Customs (HMRC) when the scheme has been registered for tax relief and exemptions. It is 10 characters made up of 8 numbers followed by 2 letters.
                            items:
                              pattern: ^\d{8}[R]{1}[a-zA-Z]{1}$
                              type: string
                              example: 00123456RA
                          surcharge:
                            type: object
                            description: The unauthorised payments surcharge.
                            properties:
                              amount:
                                description: The amount of the unauthorised payment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                              foreignTaxPaid:
                                description: The amount of foreign tax paid in pounds sterling. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                            required:
                              - amount
                              - foreignTaxPaid
                          noSurcharge:
                            type: object
                            description: Object holding unauthorised payments for no surcharge.
                            properties:
                              amount:
                                description: The amount of the unauthorised payment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                              foreignTaxPaid:
                                description: The amount of foreign tax paid in pounds sterling. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                type: number
                                example: '1999.99'
                            required:
                              - amount
                              - foreignTaxPaid
                      pensionContributions:
                        type: object
                        description: Object holding payments paid into a pension
                        properties:
                          pensionSchemeTaxReference:
                            type: array
                            description: A list of one or more unique references provided by HM Revenue and Customs (HMRC) when the scheme has been registered for tax relief and exemptions. It is 10 characters made up of 8 numbers followed by 2 letters.
                            items:
                              pattern: ^\d{8}[R]{1}[a-zA-Z]{1}$
                              type: string
                              example: 00123456RA
                          inExcessOfTheAnnualAllowance:
                            description: The amount of the in excess of the annual allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                            type: number
                            example: '1999.99'
                          annualAllowanceTaxPaid:
                            description: The amount of tax paid on annual allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                            type: number
                            example: '1999.99'
                          isAnnualAllowanceReduced:
                            description: A boolean indicating whether annual allowance has been reduced. The value must be true or false. If isAnnualAllowanceReduced is true then either taperedAnnualAllowance or moneyPurchasedAllowance must be true as well.
                            type: boolean
                            example: 'false'
                          taperedAnnualAllowance:
                            description: A boolean indicating whether tapered annual allowance is lower than the standard annual allowance. The value must be true or false.
                            type: boolean
                            example: 'true'
                          moneyPurchasedAllowance:
                            description: 'A boolean indicating whether the person has paid the maximum amount allowed for their reduced allowance, based on Money Purchase Annual Allowance (MPAA). The value must be true or false. For example: false'
                            type: boolean
                            example: 'false'
                        required:
                          - pensionSchemeTaxReference
                          - inExcessOfTheAnnualAllowance
                          - annualAllowanceTaxPaid
                      overseasPensionContributions:
                        type: object
                        description: Object holding the contributions paid into overseas pension.
                        properties:
                          overseasSchemeProvider:
                            description: Details of overseas pension provider.
                            type: array
