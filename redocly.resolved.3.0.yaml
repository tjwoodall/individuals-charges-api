                        The <code>lumpSumBenefitTakenInExcessOfLifetimeAllowance</code> and <code>benefitInExcessOfLifetimeAllowance</code> objects within <code>pensionSavingsTaxCharges</code> are now obsolete and will be removed in a future update. <b>Do not submit values for these objects</b>.
